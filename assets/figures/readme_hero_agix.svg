    <text x="48" y="182" font-size="66" font-weight="800" fill="#ffffff" font-family="DejaVu Sans, Arial">Research atlas for</text>
    <text x="48" y="258" font-size="66" font-weight="800" fill="#ffffff" font-family="DejaVu Sans, Arial">VLA · World Models · RL</text>
    <text x="48" y="334" font-size="66" font-weight="800" fill="#ffffff" font-family="DejaVu Sans, Arial">Manipulation · Grasping · Affordance</text>
    <text x="48" y="404" font-size="28" fill="#cbd5e1" font-family="DejaVu Sans, Arial">Structured roadmaps, paper systems, build paths, labs,</text>
    <text x="48" y="446" font-size="28" fill="#cbd5e1" font-family="DejaVu Sans, Arial">industry signal, and reproducible resources for embodied AI.</text>

