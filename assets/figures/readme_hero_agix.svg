    <path d="M160 735 C 400 700, 580 740, 830 660" stroke="#8b5cf6" stroke-width="1.4" fill="none"/>
    <path d="M910 120 C 1100 170, 1280 160, 1450 100" stroke="#7dd3fc" stroke-width="1.2" fill="none"/>
    <path d="M1020 760 C 1190 710, 1310 700, 1470 790" stroke="#8b5cf6" stroke-width="1.2" fill="none"/>
  </g>
  <g opacity="0.22">
