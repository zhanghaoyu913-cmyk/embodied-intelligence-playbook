      <rect x="304" y="0" width="146" height="42" rx="21" fill="rgba(125,211,252,0.12)" stroke="rgba(125,211,252,0.45)"/>
      <text x="377" y="27" text-anchor="middle" font-size="18" fill="#e7f7ff" font-family="DejaVu Sans, Arial">build paths</text>
      <rect x="466" y="0" width="126" height="42" rx="21" fill="rgba(34,211,238,0.12)" stroke="rgba(34,211,238,0.45)"/>
      <text x="529" y="27" text-anchor="middle" font-size="18" fill="#dff8ff" font-family="DejaVu Sans, Arial">maps</text>
    </g>

    <g transform="translate(48 586)" opacity="0.92">
      <path d="M0 12 H450" stroke="url(#line)" stroke-width="2"/>
      <circle cx="0" cy="12" r="5" fill="#22d3ee"/>
      <circle cx="112" cy="12" r="5" fill="#7dd3fc"/>
      <circle cx="225" cy="12" r="5" fill="#a78bfa"/>
      <circle cx="338" cy="12" r="5" fill="#22d3ee"/>
      <circle cx="450" cy="12" r="5" fill="#a78bfa"/>
      <text x="0" y="50" font-size="18" fill="#94a3b8" font-family="DejaVu Sans, Arial">perception</text>
      <text x="92" y="50" font-size="18" fill="#94a3b8" font-family="DejaVu Sans, Arial">state</text>
      <text x="198" y="50" font-size="18" fill="#94a3b8" font-family="DejaVu Sans, Arial">policy</text>
      <text x="304" y="50" font-size="18" fill="#94a3b8" font-family="DejaVu Sans, Arial">interaction</text>
      <text x="400" y="50" font-size="18" fill="#94a3b8" font-family="DejaVu Sans, Arial">deployment</text>
