    <circle cx="224" cy="280" r="8" fill="#7dd3fc" filter="url(#softGlow)"/>
    <circle cx="106" cy="280" r="8" fill="#7dd3fc" filter="url(#softGlow)"/>
    <circle cx="70" cy="168" r="9" fill="#a78bfa" filter="url(#softGlow)"/>
    <text x="165" y="270" text-anchor="middle" font-size="58" font-weight="800" fill="white" font-family="DejaVu Sans, Arial">AGI‑X</text>
    <text x="165" y="315" text-anchor="middle" font-size="16" letter-spacing="4" fill="#dbeafe" font-family="DejaVu Sans, Arial">PERSONAL RESEARCH MARK</text>
