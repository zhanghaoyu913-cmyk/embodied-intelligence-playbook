    <circle cx="165" cy="255" r="112" fill="none" stroke="url(#line)" stroke-width="1.8" opacity="0.50"/>
    <circle cx="165" cy="255" r="68" fill="none" stroke="url(#line)" stroke-width="1.5" opacity="0.45"/>
    <path d="M165 97 L260 168 L224 280 L106 280 L70 168 Z" fill="none" stroke="url(#line)" stroke-width="2.6" opacity="0.85"/>
    <path d="M165 143 L217 181 L198 243 L132 243 L113 181 Z" fill="rgba(34,211,238,0.08)" stroke="url(#line)" stroke-width="2" opacity="0.95"/>
